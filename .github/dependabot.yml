version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Ho_Chi_Minh
    open-pull-requests-limit: 10
    groups:
      patch-updates:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    allow:
      - dependency-type: all
    labels:
      - "deps"
      - "automated"
    commit-message:
      prefix: "deps"
      include: scope
    reviewers:
      - nghiavan0610
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Ho_Chi_Minh
    open-pull-requests-limit: 5
    groups:
      actions-updates:
        patterns: ["*"]
    labels:
      - "ci"
      - "automated"
    commit-message:
      prefix: "ci(deps)"
    reviewers:
      - nghiavan0610
