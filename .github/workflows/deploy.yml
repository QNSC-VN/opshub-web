# =============================================================================
# Deploy — Build Vite bundle, sync to S3, invalidate CloudFront
#
# Triggers:
#   develop → push to main (auto)
#   prod    → push a semver tag  v*.*.*
#
# Prerequisites:
#   - opshub-infra (or platform-infra) has provisioned S3 + CloudFront
#   - GitHub secrets: AWS_ACCOUNT_ID, AWS_REGION
#   - GitHub environments: "develop", "production"
#     Each with vars: S3_BUCKET, CLOUDFRONT_ID, VITE_API_BASE_URL
# =============================================================================
name: Deploy

on:
  push:
    branches: [main]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.33.2'
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  context:
    name: Resolve context
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.ctx.outputs.environment }}
      asset_tag:   ${{ steps.ctx.outputs.asset_tag }}
    steps:
      - name: Determine env + tag
        id: ctx
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
            echo "asset_tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "environment=develop" >> "$GITHUB_OUTPUT"
            echo "asset_tag=sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy to ${{ needs.context.outputs.environment }}
    runs-on: ubuntu-latest
    needs: context
    environment: ${{ needs.context.outputs.environment }}
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: nghiavan0610/qncs-gitops/actions/setup-node-pnpm@947bc9bd8e130065082f9a2e15e4f61cfbb736ca
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Build
        run: pnpm build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - uses: nghiavan0610/qncs-gitops/actions/setup-aws-oidc@947bc9bd8e130065082f9a2e15e4f61cfbb736ca
        with:
          role-arn: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/opshub-github-web-deploy-${{ needs.context.outputs.environment }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: |
          aws s3 sync dist/ s3://${{ vars.S3_BUCKET }}/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          # index.html must not be cached (cache-busting entrypoint)
          aws s3 cp dist/index.html s3://${{ vars.S3_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        uses: nghiavan0610/qncs-gitops/actions/cloudfront-invalidate@947bc9bd8e130065082f9a2e15e4f61cfbb736ca
        with:
          distribution-id: ${{ vars.CLOUDFRONT_ID }}
