# =============================================================================
# Deploy — Build Vite bundle, sync to S3, invalidate CloudFront
#
# Triggers:
#   develop → push to main (auto)
#   prod    → push a semver tag  v*.*.*  (requires "production" environment
#             approval in GitHub Settings → Environments → production)
#
# Authentication: GitHub OIDC → AWS IAM (no stored AWS keys).
#
# Prerequisites (GitHub environments "develop" and "production"):
#   Repository secrets:
#     AWS_ACCOUNT_ID           12-digit, no hyphens
#     SLACK_DEPLOY_WEBHOOK     Slack / Discord incoming webhook (optional)
#
#   Environment variables:
#     AWS_REGION               e.g. ap-southeast-1
#     S3_BUCKET                e.g. opshub-web-develop
#     CLOUDFRONT_ID            CloudFront distribution ID
#     VITE_API_URL             e.g. https://api-dev.opshub.qnsc.vn
#     VITE_APP_ENV             development | production
#     VITE_ENTRA_TENANT_ID     Azure AD tenant ID (or empty to disable SSO)
#     VITE_ENTRA_CLIENT_ID     Azure AD client ID (or empty to disable SSO)
#     APP_URL                  e.g. https://app-dev.opshub.qnsc.vn (for health)
#
#   Environment-scoped IAM roles (provisioned by opshub-infra):
#     opshub-github-web-deploy-<env>   S3 sync + CloudFront invalidation
# =============================================================================
name: Deploy

on:
  push:
    branches: [main]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # semver only — no -rc suffix

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.33.2'
  GITOPS_SHA: 947bc9bd8e130065082f9a2e15e4f61cfbb736ca   # pin qnsc-gitops

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Resolve environment from the trigger.
  # ─────────────────────────────────────────────────────────────────────────
  context:
    name: Resolve context
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      environment: ${{ steps.ctx.outputs.environment }}
      asset_tag:   ${{ steps.ctx.outputs.asset_tag }}
    steps:
      - name: Determine env + tag
        id: ctx
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
            echo "asset_tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "environment=develop" >> "$GITHUB_OUTPUT"
            echo "asset_tag=sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # Build and deploy to S3 + CloudFront.
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to ${{ needs.context.outputs.environment }}
    runs-on: ubuntu-latest
    needs: context
    environment: ${{ needs.context.outputs.environment }}
    timeout-minutes: 20
    permissions:
      id-token: write   # OIDC
      contents: read

    env:
      ASSET_TAG:   ${{ needs.context.outputs.asset_tag }}
      ENVIRONMENT: ${{ needs.context.outputs.environment }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683   # v4.2.2

      - name: Scan for secrets
        uses: QNSC-VN/qnsc-gitops/actions/scan-secrets@${{ env.GITOPS_SHA }}

      - name: Install dependencies
        uses: QNSC-VN/qnsc-gitops/actions/setup-node-pnpm@${{ env.GITOPS_SHA }}
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      # ── Build Vite bundle ─────────────────────────────────────────────────
      # All VITE_ vars are baked into the bundle at build time.
      - name: Build
        run: pnpm build
        env:
          VITE_API_URL:           ${{ vars.VITE_API_URL }}
          VITE_APP_ENV:           ${{ vars.VITE_APP_ENV }}
          VITE_ENTRA_TENANT_ID:   ${{ vars.VITE_ENTRA_TENANT_ID }}
          VITE_ENTRA_CLIENT_ID:   ${{ vars.VITE_ENTRA_CLIENT_ID }}

      # ── Configure AWS (OIDC) ──────────────────────────────────────────────
      - name: Setup AWS OIDC
        uses: QNSC-VN/qnsc-gitops/actions/setup-aws-oidc@${{ env.GITOPS_SHA }}
        with:
          role-arn: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/opshub-github-web-deploy-${{ env.ENVIRONMENT }}
          region: ${{ vars.AWS_REGION }}

      # ── Sync to S3 ────────────────────────────────────────────────────────
      # Hashed assets get a 1-year immutable cache.
      # index.html is never cached so users always load the latest entry point.
      - name: Sync dist to S3
        run: |
          aws s3 sync dist/ s3://${{ vars.S3_BUCKET }}/ \
            --delete \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable" \
            --region "${{ vars.AWS_REGION }}"

          aws s3 cp dist/index.html s3://${{ vars.S3_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html" \
            --region "${{ vars.AWS_REGION }}"

      # ── Invalidate CloudFront cache ───────────────────────────────────────
      - name: Invalidate CloudFront cache
        uses: QNSC-VN/qnsc-gitops/actions/cloudfront-invalidate@${{ env.GITOPS_SHA }}
        with:
          distribution-id: ${{ vars.CLOUDFRONT_ID }}
          region: ${{ vars.AWS_REGION }}
          wait: 'true'

      # ── Health check — confirm the new version is serving ─────────────────
      - name: Post-deploy health check
        if: vars.APP_URL != ''
        uses: QNSC-VN/qnsc-gitops/actions/post-deploy-health-check@${{ env.GITOPS_SHA }}
        with:
          url:             ${{ vars.APP_URL }}
          expected-status: '200'
          timeout-seconds: '60'

      # ── Job summary ───────────────────────────────────────────────────────
      - name: Deployment summary
        if: always()
        run: |
          STATUS="${{ job.status }}"
          echo "### Deploy $STATUS — $ENVIRONMENT" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Asset tag** | \`$ASSET_TAG\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Actor** | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **App URL** | \`${{ vars.APP_URL }}\` |" >> "$GITHUB_STEP_SUMMARY"

      # ── Notify Slack / Discord (always — even on failure) ─────────────────
      - name: Notify deploy result
        if: always()
        uses: QNSC-VN/qnsc-gitops/actions/notify-deploy@${{ env.GITOPS_SHA }}
        with:
          webhook-url: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
          status:      ${{ job.status == 'success' && 'success' || 'failure' }}
          service:     opshub-web
          environment: ${{ env.ENVIRONMENT }}
          version:     ${{ env.ASSET_TAG }}
