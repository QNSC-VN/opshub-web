# =============================================================================
# Rollback — re-deploy a previous git tag or commit to S3/CloudFront
# Use during incidents when the latest deploy introduced a regression.
# =============================================================================
name: Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to roll back
        required: true
        type: choice
        options:
          - develop
          - production
      git_ref:
        description: >
          Git tag or commit SHA to roll back to — e.g. v1.2.3 or abc1234.
          Find previous tags in Releases or the deploy workflow run history.
        required: true
        type: string

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  GITOPS_SHA: v1.0.1
  NODE_VERSION: '22'
  PNPM_VERSION: '10.33.2'
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  rollback:
    name: Rollback ${{ inputs.environment }} → ${{ inputs.git_ref }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 30
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683   # v4.2.2
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 0

      - uses: QNSC-VN/qnsc-gitops/actions/setup-node-pnpm@v1
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Build
        run: pnpm build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - uses: QNSC-VN/qnsc-gitops/actions/setup-aws-oidc@v1
        with:
          role-arn: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/opshub-github-web-deploy-${{ inputs.environment }}
          region: ${{ env.AWS_REGION }}

      - name: Sync rollback build to S3
        run: |
          aws s3 sync dist/ s3://${{ vars.S3_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          aws s3 cp dist/index.html s3://${{ vars.S3_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_ID }} \
            --paths "/*"

      - name: Rollback summary
        run: |
          echo "### Rollback complete ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Environment:** ${{ inputs.environment }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Rolled back to:** \`${{ inputs.git_ref }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **S3 bucket:** ${{ vars.S3_BUCKET }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Triggered by:** @${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> ⚠️ Remember to create a hotfix or revert the breaking commit." >> "$GITHUB_STEP_SUMMARY"
